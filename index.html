<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>混合入侵检测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fas fa-shield-haltered"></i>
                <span>Hybrid IDS</span>
            </div>
            <nav class="nav-menu">
                <a href="#" data-view="dashboard" class="nav-item active"><i class="fas fa-tachometer-alt"></i><span>仪表盘</span></a>
                <a href="#" data-view="alerts" class="nav-item"><i class="fas fa-bell"></i><span>告警管理</span></a>
                <a href="#" data-view="investigate" class="nav-item"><i class="fas fa-search"></i><span>事件调查</span></a>
                <a href="#" data-view="assets" class="nav-item"><i class="fas fa-server"></i><span>资产管理</span></a>
                <a href="#" data-view="rules" class="nav-item"><i class="fas fa-gavel"></i><span>规则管理</span></a>
                <a href="#" data-view="reports" class="nav-item"><i class="fas fa-chart-line"></i><span>报表合规</span></a>
            </nav>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <h2 id="page-title">仪表盘</h2>
                <div class="header-actions">
                    <span class="badge-status"><i class="fas fa-circle"></i> 实时监控</span>
                    <span id="backend-status" class="badge-status" style="background:#1a2a3a;margin-left:10px;">
                        <i class="fas fa-server"></i> 连接中...
                    </span>
                </div>
            </header>
            <div id="view-container" class="view-container">
                <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
            </div>
        </main>
    </div>
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
